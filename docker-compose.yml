services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: livestock-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/logs:/mosquitto/logs
    networks:
      - livestock-network
    healthcheck:
      test: ["CMD-SHELL", "netstat -tuln | grep -q 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: livestock-postgres
    environment:
      POSTGRES_USER: livestock
      POSTGRES_PASSWORD: livestock123
      POSTGRES_DB: livestock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - livestock-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livestock -d livestock_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # TimescaleDB
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: livestock-timescale
    environment:
      POSTGRES_USER: livestock
      POSTGRES_PASSWORD: livestock123
      POSTGRES_DB: timescale_db
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks:
      - livestock-network
    command: postgres -c shared_preload_libraries=timescaledb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livestock -d timescale_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: livestock-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - livestock-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: livestock-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://host.docker.internal:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - livestock-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka Init (creates topics)
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: livestock-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/kafka-init:/scripts
    working_dir: /scripts
    command: ["bash", "/scripts/init-topics.sh"]
    networks:
      - livestock-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: livestock-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://livestock:livestock123@postgres:5432/livestock_db
      TIMESCALE_URL: postgresql://livestock:livestock123@timescale:5432/timescale_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: livestock-consumer-group
      KAFKA_TELEMETRY_TOPIC: telemetry_raw
      KAFKA_ALERTS_TOPIC: alerts
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: livestock/telemetry/#
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - livestock-network
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

  # MQTT to Kafka Bridge
  bridge:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: livestock-bridge
    command: python -m app.worker.mqtt_to_kafka_bridge
    environment:
      DATABASE_URL: postgresql://livestock:livestock123@postgres:5432/livestock_db
      TIMESCALE_URL: postgresql://livestock:livestock123@timescale:5432/timescale_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TELEMETRY_TOPIC: telemetry_raw
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: livestock/telemetry/#
      DEBUG: "true"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mosquitto:
        condition: service_healthy
    networks:
      - livestock-network
    volumes:
      - ./app:/app/app

  # Kafka Consumer Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: livestock-worker
    command: python -m app.worker.kafka_consumer
    environment:
      DATABASE_URL: postgresql://livestock:livestock123@postgres:5432/livestock_db
      TIMESCALE_URL: postgresql://livestock:livestock123@timescale:5432/timescale_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: livestock-consumer-group
      KAFKA_TELEMETRY_TOPIC: telemetry_raw
      KAFKA_ALERTS_TOPIC: alerts
      DEBUG: "true"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescale:
        condition: service_healthy
    networks:
      - livestock-network
    volumes:
      - ./app:/app/app

  # Real-time Simulator
  simulator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: livestock-simulator
    command: python scripts/realtime_simulator.py
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - livestock-network
    volumes:
      - ./scripts:/app/scripts

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend/Dockerfile
    container_name: livestock-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_WS_URL: ws://api:8000
    depends_on:
      - api
    networks:
      - livestock-network

networks:
  livestock-network:
    driver: bridge

volumes:
  postgres-data:
  timescale-data: